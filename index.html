<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flappy Atachian</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <aside id="scorebug" aria-live="polite">
      <div class="scorebug-header">
        <span class="scorebug-title">WC 2026</span>
        <span class="scorebug-badge">LIVE</span>
      </div>
      <div id="scorebug-body" class="scorebug-body">
        <p class="scorebug-empty">Loading scores…</p>
      </div>
      <p id="scorebug-updated" class="scorebug-updated"></p>
    </aside>
    <div id="overlay">
      <h1>Flappy Atachian</h1>
      <p id="subtitle">Navigate the courtyard arches</p>
      <p id="instructions">Tap, click, or press Space to fly</p>
      <p id="score-display"></p>
      <button id="start-btn" type="button">Start Game</button>
    </div>
  </div>
  <script src="config.js" onerror="window.SCOREBUG_CONFIG={}"></script>
  <script src="scorebug.js"></script>
  <script src="game.js"></script>
</body>
</html>
